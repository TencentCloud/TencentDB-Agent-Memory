version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "supply-chain"
    commit-message:
      prefix: "chore(deps)"
    groups:
      production-deps:
        dependency-type: "production"
        update-types: ["patch", "minor"]
      dev-deps:
        dependency-type: "development"
        update-types: ["patch", "minor"]
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    labels:
      - "dependencies"
      - "ci"
