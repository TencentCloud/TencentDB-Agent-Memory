name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: ["*"]

# Cancel previous runs for the same PR / branch
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # 鈹€鈹€ 1. Install dependencies 鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€
  install:
    name: Install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Cache node_modules
        uses: actions/cache@v4
        id: cache-deps
        with:
          path: node_modules
          key: deps-${{ runner.os }}-${{ hashFiles('package.json') }}

      - name: npm install
        if: steps.cache-deps.outputs.cache-hit != 'true'
        run: npm install --ignore-scripts

  # 鈹€鈹€ 2. Pack validation 鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€
  pack:
    name: Pack
    needs: install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Restore node_modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: deps-${{ runner.os }}-${{ hashFiles('package.json') }}

      - name: Install dependencies on cache miss
        run: test -x node_modules/.bin/tsdown || npm install --ignore-scripts

      - name: npm pack (dry-run)
        run: npm pack --dry-run

      - name: npm pack
        run: npm pack

      - name: Upload .tgz artifact
        uses: actions/upload-artifact@v4
        with:
          name: package-tarball
          path: "*.tgz"
          retention-days: 7

  # 鈹€鈹€ 5. Plugin manifest validation 鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€
  manifest:
    name: Manifest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate openclaw.plugin.json
        run: |
          echo "鈹€鈹€ Checking openclaw.plugin.json exists 鈹€鈹€"
          test -f openclaw.plugin.json || { echo "鉂?openclaw.plugin.json not found"; exit 1; }

          echo "鈹€鈹€ Checking valid JSON 鈹€鈹€"
          node -e "JSON.parse(require('fs').readFileSync('openclaw.plugin.json','utf8'))" || { echo "鉂?Invalid JSON"; exit 1; }

          echo "鈹€鈹€ Checking required fields 鈹€鈹€"
          node -e "
            const m = JSON.parse(require('fs').readFileSync('openclaw.plugin.json','utf8'));
            const errors = [];
            if (!m.id || typeof m.id !== 'string') errors.push('missing or invalid \"id\"');
            if (m.configSchema && typeof m.configSchema !== 'object') errors.push('\"configSchema\" must be an object');
            if (errors.length) { console.error('鉂?Manifest errors:', errors.join(', ')); process.exit(1); }
            console.log('鉁?id:', m.id);
            if (m.name) console.log('   name:', m.name);
            if (m.configSchema) console.log('   configSchema: present (' + Object.keys(m.configSchema.properties || {}).length + ' top-level props)');
          "

          echo "鈹€鈹€ Checking package.json openclaw metadata 鈹€鈹€"
          node -e "
            const pkg = JSON.parse(require('fs').readFileSync('package.json','utf8'));
            const oc = pkg.openclaw || {};
            const errors = [];
            if (!oc.extensions || !oc.extensions.length) errors.push('missing openclaw.extensions');
            if (!oc.compat?.pluginApi) errors.push('missing openclaw.compat.pluginApi');
            if (!oc.build?.openclawVersion) errors.push('missing openclaw.build.openclawVersion');
            if (errors.length) { console.error('鉂?Package metadata errors:', errors.join(', ')); process.exit(1); }
            console.log('鉁?openclaw metadata OK');
            console.log('   pluginApi:', oc.compat.pluginApi);
            console.log('   openclawVersion:', oc.build.openclawVersion);
          "

  # 鈹€鈹€ 6. Package size guard 鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€
  size:
    name: Size Guard
    needs: pack
    runs-on: ubuntu-latest
    steps:
      - name: Download tarball
        uses: actions/download-artifact@v4
        with:
          name: package-tarball

      - name: Check package size
        run: |
          TGZ=$(ls *.tgz | head -1)
          SIZE=$(stat -c%s "$TGZ" 2>/dev/null || stat -f%z "$TGZ")
          SIZE_KB=$((SIZE / 1024))
          MAX_KB=2048

          echo "馃摝 Package: $TGZ"
          echo "   Size: ${SIZE_KB} KB (limit: ${MAX_KB} KB)"

          if [ "$SIZE_KB" -gt "$MAX_KB" ]; then
            echo "鉂?Package exceeds ${MAX_KB} KB size limit!"
            echo "   Consider checking if large files were accidentally included."
            exit 1
          else
            echo "鉁?Size OK"
          fi

  # 鈹€鈹€ 7. TypeScript adapter tests 鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€
  test-ts:
    name: Test TS
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Restore node_modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: deps-${{ runner.os }}-${{ hashFiles('package.json') }}

      - name: npm install
        if: steps.cache-deps.outputs.cache-hit != 'true'
        run: npm install --ignore-scripts

      - name: Run MemoryAdapter tests
        run: npx vitest run src/core/memory-adapter.test.ts --reporter=verbose

      - name: Run TdaiHttpClient unit tests
        run: npx vitest run src/core/tdai-http-client.test.ts --reporter=verbose

  # 鈹€鈹€ 8. Python bridge_adapter smoke test 鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€
  test-py:
    name: Test Python
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install bridge_adapter
        run: pip install ./bridge_adapter

      - name: Import smoke test
        run: |
          python -c "
          from bridge_adapter import BridgeAdapter, TdaiAdapterRegistry
          from bridge_adapter.base import TdaiAdapter
          from bridge_adapter.integrity import verify_manifest
          print(f'Import OK 鈥?bridge_adapter registered adapters: {TdaiAdapterRegistry.list()}')
          violations = verify_manifest()
          if violations:
            print(f'SHA256 integrity: {len(violations)} violation(s)')
            for v in violations:
              print(f'  鉁?{v}')
            exit(1)
          else:
            print('SHA256 integrity: OK')
          "
